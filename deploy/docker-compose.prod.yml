services:
  backend:
    restart: always
    volumes: []
    environment:
      # Fail the deploy loudly instead of silently falling back to the dev-only default in
      # docker-compose.yml. Set JWT_SECRET in the shell env or a repo-root .env file before
      # running `docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up`.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set for production — see backend/.env.example}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  dashboard:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  db:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
