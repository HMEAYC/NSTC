services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hmeayc
      POSTGRES_PASSWORD: hmeayc
      POSTGRES_DB: hmeayc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmeayc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://hmeayc:hmeayc@db:5432/hmeayc
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  dashboard:
    build: ./dashboard
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
